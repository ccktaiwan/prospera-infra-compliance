# Secret Scanning — P0 資安（PENDING-052 / SECURITY_IMMUNE_SYSTEM）BLOCKING
# 防 API key / token / 密鑰誤 commit（ANTHROPIC sk-ant- / META EAA / AWS / GitHub token 等）。
# 用 gitleaks（業界標準，免費）。只掃「本次變更 commit 範圍」→ 既有歷史殘留不阻斷，只擋新引入 secret。
# blocking 合理：secret 外洩是承重風險，非語意偵測（不會誤殺），掃到即擋 merge 要求移除。
# 設定：.gitleaks.toml（內建規則集 + Prospera 專屬 sk-ant/EAA + 範本白名單）。
name: Secret Scanning (P0 BLOCKING)
on:
  push:
  pull_request:
jobs:
  gitleaks:
    name: gitleaks 密鑰掃描（誤 commit secret 即 BLOCK）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: 裝 gitleaks（pinned）
        run: |
          set -e
          VER=8.18.4
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: 掃變更 commit 範圍（BLOCKING，既有歷史殘留不阻斷）
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          # 首推/新分支（無有效 BASE）→ 掃該 HEAD commit；否則掃 BASE..HEAD 新增範圍
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            LOGOPTS="${HEAD}~1..${HEAD}"
            if ! git cat-file -e "${HEAD}~1^{commit}" 2>/dev/null; then LOGOPTS="${HEAD}"; fi
          else
            LOGOPTS="${BASE}..${HEAD}"
          fi
          echo "掃描範圍：$LOGOPTS"
          gitleaks detect \
            --config .gitleaks.toml \
            --log-opts="$LOGOPTS" \
            --redact -v \
            --exit-code 1
      - name: 結果說明
        if: failure()
        run: |
          echo "❌ BLOCKING：偵測到疑似 secret（API key/token/密鑰）誤入本次變更。"
          echo "修正：① 從變更移除該 secret（改放 gitignored .env）② 若為佔位/示例，加進 .gitleaks.toml allowlist"
          echo "③ 已外洩之 key 須立即輪替（rotate）—— git 移除不等於未外洩。"
