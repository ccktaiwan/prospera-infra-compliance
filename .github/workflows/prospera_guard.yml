# ── Prospera SYSTEM HEADER (ADR-0032/SBOM) ──
# 性質:config ｜設計:Kevin 架構 ｜執行:AI 工具(claude.ai+Claude Code)
# 驗證:無機制驗證 ｜IP:創造性歸 Kevin(發明人), AI 為執行工具 (ADR-0032)
name: "Prospera Law 1.0 Guard"
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  governance-enforcement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Enforce Law 1.0 Rules"
        shell: pwsh
        run: |
          $ForbiddenRootFiles = @("*.exe","*.dll","*.zip","*.tar.gz")
          $ViolationCount = 0
          Write-Host "--- Prospera Law 1.0 Guard (Transitional Mode) ---"
          $AllFiles = Get-ChildItem -Recurse -File | Where-Object {
              $_.FullName -notmatch "node_modules|\.git|99_archive"
          }
          foreach ($file in $AllFiles) {
              foreach ($pattern in $ForbiddenRootFiles) {
                  if ($file.Name -like $pattern) {
                      Write-Host " [GOV_VIOLATION] file: $($file.Name) reason: FORBIDDEN_BINARY"
                      $ViolationCount++
                  }
              }
          }
          if ($ViolationCount -gt 0) {
              Write-Host "LAW 1.0 VIOLATED: $ViolationCount critical issues."
              exit 1
          } else {
              Write-Host "LAW 1.0 PASSED (Transitional Mode - Structure migration pending)"
          }